language: node_js

node_js:
  - lts/*

services:
  - docker
  
install:
  - npm install

script: 
  - npm test

after_success:
  - docker build -t $DOCKER_IMAGE_SCW
    --build-arg LCD_URL=${ALMERICO_LCD_URL}
    --build-arg RPC_URL=${ALMERICO_RPC_URL}
    --build-arg WS_URL=${ALMERICO_WS_URL}
    --build-arg API_VERSION=${ALMERICO_API_VERSION}
    .

deploy:
  provider: script
  script: 
    echo "$DOCKER_PASSWORD" | docker login $DOCKER_REGISTRY -u "$DOCKER_USERNAME" --password-stdin
    docker push $DOCKER_IMAGE_SCW
  on:
    branch: development
